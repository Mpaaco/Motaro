<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Motaro</title>
    <meta name="description" content="Registro de Solicitação - MotaroApp.">
    <link rel="icon" type="image/png" href="./assent/img/logo.png">
    <link rel="stylesheet" href="./style/global/global.css">
    <link rel="stylesheet" href="./style/pages/home.css">
    <link rel="stylesheet" href="./style/pages/registro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <img src="./assent/img/logo.png" alt="Motaro Logo" class="logo-pulse">
            <div class="loading-dots"><div></div><div></div><div></div><div></div></div>
        </div>
    </div>

    <header>
        <div class="menu-toggle" id="menu-toggle"><span></span><span></span><span></span></div>
        <nav class="menu" id="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro.html">Registro de Cliente</a></li>
                <li><a href="registro.html">Registro de Solicitação</a></li>
                <li><a href="solicitacoes.html">Solicitações</a></li>
            </ul>
        </nav>
        <div class="namepage"><h2>Registro</h2></div>
        <div class="logo"><img src="./assent/img/logo.png" alt="logo"></div>
    </header>

    <main class="registro-container">
        <div class="page-title">
            <h1><span class="highlight-green">Registro</span> de Solicitação</h1>
        </div>

        <!-- BUSCA POR CPF -->
        <div class="cpf-search-card">
            <div class="cpf-search-row">
                <div class="input-card single-line cpf-input-wrapper">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M9 11.75A1.25 1.25 0 1 0 9 14.25 1.25 1.25 0 0 0 9 11.75zM15 11.75A1.25 1.25 0 1 0 15 14.25 1.25 1.25 0 0 0 15 11.75zM12 2A10 10 0 1 0 12 22 10 10 0 0 0 12 2z"/></svg>
                    <input type="tel" id="cpfSearch" placeholder="CPF do cliente:" maxlength="14">
                </div>
                <button type="button" id="btnBuscar" class="btn-buscar">Buscar</button>
            </div>
        </div>

        <!-- CARD DO CLIENTE -->
        <div class="client-card" id="clientCard" style="display: none;">
            <div class="client-card-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="#7AD95F"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div class="client-card-info">
                <p class="client-nome" id="clientNome">—</p>
                <p class="client-veiculo" id="clientVeiculo">—</p>
            </div>
        </div>

        <!-- SELEÇÃO DE VEÍCULO -->
        <div class="veiculo-selector" id="veiculoSelector" style="display: none;">
            <p class="veiculo-question">Deseja registrar a solicitação em qual veículo?</p>
            <div class="veiculo-options" id="veiculoOptions"></div>
            <button type="button" class="btn-novo-veiculo" id="btnNovoVeiculo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Adicionar novo carro
            </button>
            <!-- Formulário de novo veículo (oculto inicialmente) -->
            <div class="novo-veiculo-form" id="novoVeiculoForm" style="display: none;">
                <div class="input-card single-line" style="margin-top: 12px;">
                    <input type="text" id="nvMarca"  placeholder="Marca:">
                </div>
                <div class="input-card single-line" style="margin-top: 10px;">
                    <input type="text" id="nvModelo" placeholder="Modelo:">
                </div>
                <div class="input-card single-line" style="margin-top: 10px;">
                    <input type="number" id="nvAno"  placeholder="Ano:">
                </div>
                <div class="input-card single-line" style="margin-top: 10px;">
                    <input type="text" id="nvPlaca"  placeholder="Placa (ex: ABC-1234):" maxlength="8">
                </div>
                <button type="button" id="btnSalvarVeiculo" class="btn-buscar" style="margin-top: 12px; width: 100%; padding: 14px;">
                    Salvar e usar este carro
                </button>
            </div>
        </div>

        <!-- FORMULÁRIO DE REGISTRO -->
        <form class="registro-form" id="registroForm" style="display: none;">

            <!-- Placa selecionada (readonly) -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 12H5V6h14v10z"/></svg>
                <input type="text" id="placaSelecionada" readonly style="background:transparent;color:#7AD95F;font-weight:700;">
            </div>

            <!-- Título -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
                <input type="text" id="titulo" placeholder="Título da solicitação:" required maxlength="80">
            </div>

            <!-- Descrição -->
            <div class="input-card input-textarea-card">
                <div class="input-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <textarea id="descricao" placeholder="Descrição do serviço (opcional):" maxlength="300"></textarea>
                </div>
                <div class="char-counter"><span id="charCount">0/300</span></div>
            </div>

            <!-- Fotos -->
            <div class="input-card upload-card">
                <div class="upload-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <span>Foto do problema</span>
                </div>
                <div class="upload-zone">
                    <div class="upload-instructions"><p>Adicione até 4 fotos do problema.</p></div>
                    <input type="file" id="fotoProblema" accept="image/*" multiple max="4" style="display:none;">
                    <div class="upload-actions">
                        <button type="button" class="btn-upload-option" id="btnOpenCamera">
                            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                            <span>Tirar Foto</span>
                        </button>
                        <span class="upload-divider">ou</span>
                        <button type="button" class="btn-upload-option" onclick="document.getElementById('fotoProblema').click()">
                            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                            <span>Carregar Imagem</span>
                        </button>
                    </div>
                    <div id="cameraModal" class="camera-inline" style="display:none;">
                        <video id="cameraVideo" autoplay playsinline></video>
                        <canvas id="cameraCanvas" style="display:none;"></canvas>
                        <div id="cameraLiveControls" class="camera-controls">
                            <button type="button" id="btnSwitchCamera" class="btn-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg></button>
                            <button type="button" id="btnCapturePhoto" class="btn-capture"><div class="capture-inner"></div></button>
                            <button type="button" id="btnCloseCamera" class="btn-icon text-danger"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                        </div>
                        <div id="cameraApprovalControls" class="camera-approval-controls" style="display:none;">
                            <button type="button" id="btnRejectPhoto" class="btn-secondary">Tentar Novamente</button>
                            <button type="button" id="btnApprovePhoto" class="btn-primary-small">Aprovado</button>
                        </div>
                    </div>
                    <div id="imagePreview" class="image-preview-container"></div>
                </div>
            </div>

            <!-- Valor -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                <input type="text" id="valorOrcamento" placeholder="Valor do orçamento:" required>
            </div>

            <!-- Forma de Pagamento -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                <select id="formaPagamento" required>
                    <option value="" disabled selected>Forma de pagamento:</option>
                    <option value="debito">Débito</option>
                    <option value="credito">Crédito</option>
                    <option value="boleto">Boleto</option>
                    <option value="pix">Pix</option>
                </select>
            </div>

            <!-- Prazo de Entrega -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm0 16H5V8h14v11z"/></svg>
                <input type="text" id="prazoEntrega" placeholder="Prazo de entrega (DD/MM/AAAA):" inputmode="numeric" maxlength="10" required>
            </div>

            <button type="submit" class="btn-submit">Concluir</button>
        </form>

        <!-- HISTÓRICO DE REGISTROS -->
        <section class="historico-section" id="historicoSection" style="display:none;">
            <h2 class="historico-title">Histórico de Registros</h2>
            <div class="historico-list" id="historicoList"></div>
        </section>
    </main>

    <script src="./js/main.js"></script>
    <script type="module" src="./js/registro.js"></script>
</body>
</html>
