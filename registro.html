<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Motaro</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Registro de Solicitação - MotaroApp.">
    <meta property="og:title" content="Motaro - Registro">
    <meta property="og:description" content="Registre solicitações de serviços diretamente na Morrone's Mecânica.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="./assent/img/logo.png">
    
    <link rel="stylesheet" href="./style/global/global.css">
    <link rel="stylesheet" href="./style/pages/home.css">
    <link rel="stylesheet" href="./style/pages/registro.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <img src="./assent/img/logo.png" alt="Motaro Logo" class="logo-pulse">
            <div class="loading-dots">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
    </div>

    <!-- HEADER / MENU -->
    <header>
        <div class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <nav class="menu" id="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro.html">Cadastro Cliente</a></li>
                <li><a href="registro.html">Registro Serviço</a></li>
            </ul>
        </nav>
        
        <div class="namepage">
            <h2>Cadastro</h2>
        </div>
        
        <div class="logo">
            <img src="./assent/img/logo.png" alt="logo">
        </div>
    </header>

    <!-- CONTENT -->
    <main class="registro-container">
        <div class="page-title">
            <h1><span class="highlight-green">Registro</span> de Solicitação</h1>
        </div>

        <form class="registro-form" id="registroForm">
            <!-- 1. Descrição -->
            <div class="input-card input-textarea-card">
                <div class="input-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <textarea id="descricao" placeholder="Descreva o serviço:" maxlength="300" required></textarea>
                </div>
                <div class="char-counter">
                    <span id="charCount">0/300</span>
                </div>
            </div>

            <!-- 2. Fotos -->
            <div class="input-card upload-card">
                <div class="upload-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <span>Foto do problema</span>
                </div>
                
                <div class="upload-zone">
                    <div class="camera-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </div>
                    
                    <div class="upload-instructions">
                        <p>Adicione a foto do local do</p>
                        <p>problema. Lembre-se, essa foto</p>
                        <p>será enviada para o nosso</p>
                        <p>cliente.</p>
                    </div>
                    
                    <input type="file" id="fotoProblema" accept="image/*" multiple max="4" style="display: none;">
                    <button type="button" class="btn-camera-trigger" id="btnOpenCamera">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        <span>Tirar Foto</span>
                    </button>
                    <!-- Alternate conventional upload -->
                    <p class="upload-fallback" onclick="document.getElementById('fotoProblema').click()">ou escolha do <br> dispositivo</p>

                    <!-- INLINE CAMERA COMPONENT -->
                    <div id="cameraModal" class="camera-inline" style="display: none;">
                        <video id="cameraVideo" autoplay playsinline></video>
                        <canvas id="cameraCanvas" style="display: none;"></canvas>
                        
                        <!-- Actions during LIVE Video -->
                        <div id="cameraLiveControls" class="camera-controls">
                            <button type="button" id="btnSwitchCamera" class="btn-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="1 4 1 10 7 10"></polyline>
                                    <polyline points="23 20 23 14 17 14"></polyline>
                                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                                </svg>
                            </button>
                            
                            <button type="button" id="btnCapturePhoto" class="btn-capture">
                                <div class="capture-inner"></div>
                            </button>
                            
                            <button type="button" id="btnCloseCamera" class="btn-icon text-danger">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>

                        <!-- Actions during APPROVAL (Photo taken) -->
                        <div id="cameraApprovalControls" class="camera-approval-controls" style="display: none;">
                            <button type="button" id="btnRejectPhoto" class="btn-secondary">Tentar Novamente</button>
                            <button type="button" id="btnApprovePhoto" class="btn-primary-small">Aprovado</button>
                        </div>
                    </div>
                    <!-- End Inline Camera Component -->

                    <!-- Preview Area -->
                    <div id="imagePreview" class="image-preview-container"></div>
                </div>
            </div>

            <!-- 3. Valor -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="valorOrcamento" placeholder="Valor do orçamento:" required>
            </div>

            <!-- 4. Forma Pagamento -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <select id="formaPagamento" required>
                    <option value="" disabled selected>Forma de pagamento:</option>
                    <option value="debito">Débito</option>
                    <option value="credito">Crédito</option>
                    <option value="boleto">Boleto</option>
                    <option value="pix">Pix</option>
                </select>
            </div>

            <!-- 5. Prazo Entrega -->
            <div class="input-card single-line">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="prazoEntrega" placeholder="Prazo de entrega (DD/MM/AAAA):" inputmode="numeric" maxlength="10" required>
            </div>

            <button type="submit" class="btn-submit">Concluir</button>
        </form>
    </main>

    <script src="./js/main.js"></script>
    <script src="./js/registro.js"></script>
</body>
</html>
