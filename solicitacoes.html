<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitações - Motaro</title>
    <meta name="description" content="Gerenciamento de Solicitações - MotaroApp.">
    <link rel="icon" type="image/png" href="./assent/img/logo.png">
    <link rel="stylesheet" href="./style/global/global.css">
    <link rel="stylesheet" href="./style/pages/home.css">
    <link rel="stylesheet" href="./style/pages/solicitacoes.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <img src="./assent/img/logo.png" alt="Motaro Logo" class="logo-pulse">
            <div class="loading-dots"><div></div><div></div><div></div><div></div></div>
        </div>
    </div>

    <header>
        <div class="menu-toggle" id="menu-toggle">
            <span></span><span></span><span></span>
        </div>
        <nav class="menu" id="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro.html">Registro de Cliente</a></li>
                <li><a href="registro.html">Registro de Solicitação</a></li>
                <li><a href="solicitacoes.html">Solicitações</a></li>
                <li><a href="financeiro.html">Financeiro</a></li>
            </ul>
        </nav>
        <div class="namepage"><h2>Solicitações</h2></div>
        <div class="logo"><img src="./assent/img/logo.png" alt="logo"></div>
    </header>

    <main class="solicitacoes-page">
        <div class="page-title">
            <h1>Todas as <span>Solicitações</span></h1>
        </div>

        <!-- BUSCA POR CPF -->
        <div class="search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#A8A8A9">
                <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="tel" id="searchCpf" placeholder="Pesquisar por CPF..." maxlength="14">
        </div>

        <!-- GRID DE CARDS DE CLIENTES -->
        <div class="clients-grid" id="clientsGrid">
            <div class="empty-state">Carregando clientes...</div>
        </div>
    </main>

    <!-- MODAL 1: LISTA DE REGISTROS DO CLIENTE -->
    <div class="modal-overlay" id="modal1Overlay">
        <div class="modal-sheet" id="modal1Sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div>
                    <p class="modal-title" id="modal1Title">—</p>
                    <p class="modal-subtitle" id="modal1Subtitle">—</p>
                </div>
                <button class="btn-modal-close" id="btnCloseModal1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#626262"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="records-list" id="recordsList"></div>
        </div>
    </div>

    <!-- MODAL 2: DETALHE COMPLETO DO REGISTRO -->
    <div class="modal-overlay" id="modal2Overlay">
        <div class="modal-sheet" id="modal2Sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div>
                    <p class="modal-title" id="modal2Title">—</p>
                    <p class="modal-subtitle" id="modal2Date">—</p>
                </div>
                <button class="btn-modal-close" id="btnCloseModal2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#626262"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>

            <div class="detail-section">
                <p class="detail-label">Status</p>
                <div id="detail-status"></div>
            </div>

            <div class="detail-divider"></div>

            <div class="detail-section">
                <p class="detail-label">Descrição</p>
                <p class="detail-value" id="detail-descricao">—</p>
            </div>

            <div class="detail-divider"></div>

            <div class="detail-row">
                <div class="detail-section">
                    <p class="detail-label">Valor</p>
                    <p class="detail-value" id="detail-valor">—</p>
                </div>
                <div class="detail-section">
                    <p class="detail-label">Pagamento</p>
                    <p class="detail-value" id="detail-pagamento">—</p>
                </div>
            </div>

            <div class="detail-divider"></div>

            <div class="detail-section">
                <p class="detail-label">Prazo de Entrega</p>
                <span class="detail-pill" id="detail-prazo">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="#3a8a2a"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm0 16H5V8h14v11z"/></svg>
                    <span>—</span>
                </span>
            </div>

            <div class="detail-divider"></div>

            <div class="detail-section">
                <p class="detail-label">Fotos</p>
                <div class="photos-grid" id="detail-fotos"></div>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
    <script type="module" src="./js/solicitacoes.js"></script>

    <!-- LIGHTBOX -->
    <div class="lightbox-overlay" id="lightboxOverlay">
        <button class="lightbox-close" id="lightboxClose">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="Foto ampliada">
    </div>
</body>
</html>
