<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Motaro</title>
    <meta name="description" content="Cadastro de Clientes - MotaroApp.">
    <link rel="icon" type="image/png" href="./assent/img/logo.png">
    <link rel="stylesheet" href="./style/global/global.css">
    <link rel="stylesheet" href="./style/pages/home.css">
    <link rel="stylesheet" href="./style/pages/cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <img src="./assent/img/logo.png" alt="Motaro Logo" class="logo-pulse">
            <div class="loading-dots"><div></div><div></div><div></div><div></div></div>
        </div>
    </div>

    <header>
        <div class="menu-toggle" id="menu-toggle"><span></span><span></span><span></span></div>
        <nav class="menu" id="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro.html">Registro de Cliente</a></li>
                <li><a href="registro.html">Registro de Solicitação</a></li>
                <li><a href="solicitacoes.html">Solicitações</a></li>
            </ul>
        </nav>
        <div class="namepage"><h2>Cadastro</h2></div>
        <div class="logo"><img src="./assent/img/logo.png" alt="logo"></div>
    </header>

    <main class="cadastro">
        <div class="page-title">
            <h1><span>Cadastre</span> seu cliente</h1>
        </div>

        <form class="cadastro-form">
            <!-- Nome -->
            <div class="input-group">
                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></span>
                <input type="text" id="nome" placeholder="Nome do cliente:" required maxlength="100">
            </div>

            <!-- CPF -->
            <div class="input-group">
                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M9 11.75A1.25 1.25 0 1 0 9 14.25 1.25 1.25 0 0 0 9 11.75zM15 11.75A1.25 1.25 0 1 0 15 14.25 1.25 1.25 0 0 0 15 11.75zM12 2A10 10 0 1 0 12 22 10 10 0 0 0 12 2z"/></svg></span>
                <input type="tel" id="cpf" placeholder="CPF do cliente:" required maxlength="14">
            </div>

            <!-- Contato -->
            <div class="input-group">
                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C9.39 21 3 14.61 3 7a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.58a1 1 0 0 1-.25 1.01l-2.2 2.2z"/></svg></span>
                <input type="tel" id="contato" placeholder="Número de contato:" required maxlength="15">
            </div>

            <div class="section-label">Veículo</div>

            <!-- Marca -->
            <div class="input-group">
                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1h12v1a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM5 17.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm14 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg></span>
                <input type="text" id="marca" placeholder="Marca (ex: Fiat, VW):" required maxlength="50">
            </div>

            <!-- Modelo -->
            <div class="input-group">
                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 3c1.93 0 3.5 1.57 3.5 3.5S13.93 14 12 14s-3.5-1.57-3.5-3.5S10.07 7 12 7z"/></svg></span>
                <input type="text" id="modelo" placeholder="Modelo do carro:" required maxlength="50">
            </div>

            <!-- Ano -->
            <div class="input-group">
                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M19 3H5c-1.1 0-2 .9-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg></span>
                <input type="number" id="ano" placeholder="Ano do carro:" required min="1900" max="2100">
            </div>

            <!-- Placa -->
            <div class="input-group">
                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 12H5V6h14v10z"/></svg></span>
                <input type="text" id="placa" placeholder="Placa do veículo (ex: ABC-1234):" required maxlength="8">
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary">Registrar<br>Cliente</button>
                <button type="button" id="btnProximo" class="btn-primary" disabled>Próximo</button>
            </div>
        </form>
    </main>

    <script src="./js/main.js"></script>
    <script type="module" src="./js/cadastro.js"></script>
</body>
</html>
