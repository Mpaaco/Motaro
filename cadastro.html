<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Motaro</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Cadastro de Vículos - MotaroApp.">
    <meta property="og:title" content="Motaro - Cadastro">
    <meta property="og:description" content="Cadastre seus clientes diretamente da Morrone's Mecânica.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="./assent/img/logo.png">
    <link rel="stylesheet" href="./style/global/global.css">
    <link rel="stylesheet" href="./style/pages/home.css">
    <link rel="stylesheet" href="./style/pages/cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="menu" id="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro.html">Registro</a></li>
            </ul>
        </nav>
        <div class="namepage">
            <h2>Cadastro</h2>
        </div>
        <div class="logo">
            <img src="./assent/img/logo.png" alt="logo">
        </div>
    </header>

    <main class="cadastro">
        <div class="page-title">
            <h1><span>Cadastre</span> seu cliente</h1>
        </div>

        <form class="cadastro-form">
            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </span>
                <input type="text" id="nome" placeholder="Nome do cliente:" required maxlength="100">
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                </span>
                <input type="tel" id="cpf" placeholder="CPF do cliente:" required maxlength="14">
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                </span>
                <input type="tel" id="contato" placeholder="Número de contato:" required maxlength="15">
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                </span>
                <input type="text" id="modelo" placeholder="Modelo do carro:" required maxlength="50">
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#626262"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                </span>
                <input type="number" id="ano" placeholder="Ano do carro:" required min="1900" max="2100">
            </div>

            <div class="actions">
                <button type="button" class="btn-primary">Próximo</button>
                <button type="submit" class="btn-primary">Registar<br>Solicitação</button>
            </div>
        </form>
    </main>

    <script src="./js/main.js"></script>
    <script src="./js/cadastro.js"></script>
</body>
</html>
